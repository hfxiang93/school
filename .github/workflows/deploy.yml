name: Deploy to GitHub Pages

# 触发条件：推送到 main/master 分支时自动部署
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest # 用 GitHub 服务器部署，速度快
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # （可选）如果你的项目需要构建（比如 Vue/React/打包工具），添加构建步骤
      # - name: 安装依赖
      #   run: npm install
      # - name: 构建项目
      #   run: npm run build

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # 成熟的部署插件，速度快
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 自动生成，无需手动配置
          publish_dir: ./ # 静态文件目录（如果是构建后的 dist，改成 ./dist）
          publish_branch: gh-pages # 部署到 gh-pages 分支
